name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -X POST https://marriage-lab.com/deploy.php \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}' \
            --fail --silent --show-error
