name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: sv16738.xserver.jp
          username: admin@marriage-lab.com
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /marriage-lab.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            deploy.php
